<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycu Clicker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
    text-align: center;
    color: #333;
    margin: 0;
    padding: 0;
  }

  #score {
    font-size: 24px;
    margin-bottom: 20px;
    color: #555;
  }

  .item {
    display: inline-block;
    margin: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    cursor: pointer;
    background-color: #fff;
    box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
    vertical-align: top;
    width: 200px;
  }

  .item:hover {
    transform: scale(1.05);
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
  }

  .item img {
    width: 100px;
    height: 100px;
    margin-bottom: 10px;
    border-radius: 5px;
  }

  #shop {
    margin-top: 20px;
    text-align: center;
  }

  .inventory {
    margin-top: 30px;
    width: 90%;
    margin-left: auto;
    margin-right: auto;
    max-height: 400px;
    overflow: auto;
    text-align: center;
  }

  .inventory-item {
    display: inline-block;
    margin: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #fff;
    box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
    width: 150px;
  }

  .inventory-item:hover {
    transform: scale(1.05);
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
  }

  .inventory-item img {
    width: 80px;
    height: auto;
    border-radius: 5px;
  }

  .inventory-item-name {
    margin-top: 5px;
    font-size: 14px;
    color: #555;
  }

  .inventory-item-count {
    margin-top: 5px;
    font-weight: bold;
    color: #777;
  }

  .item-animation {
    animation: item-bought 1s ease;
  }

  @keyframes item-bought {
    0% { transform: translateY(-20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  #reset-button {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 10px 20px;
    background-color: #ff6b6b;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s ease;
  }

  #reset-button:hover {
    background-color: #ff5252;
  }
</style>
</head>
<body>

<button id="reset-button" onclick="resetGame()">Resetuj grę</button>

<div id="score">Cycu: <span id="score-value">0</span></div>

<div id="shop">
  <div class="item" onclick="buyItem(100)">
    <img src="Bułka.png" alt="Bułka">
    <div style="color: #555;">Bułka (100 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(500)">
    <img src="Burger.png" alt="Burger">
    <div style="color: #555;">Burger (500 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(2500)">
    <img src="Pizza.png" alt="Pizza">
    <div style="color: #555;">Pizza (1000 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(5000)">
    <img src="kebab.png" alt="Kebab">
    <div style="color: #555;">Kebab (5000 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(12000)">
    <img src="Nuggetsy z Frytkami.png" alt="Nuggetsy z Frytkami">
    <div style="color: #555;">Nuggetsy z Frytkami (12000 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(100000)">
    <img src="Sałatka.png" alt="Sałatka">
    <div style="color: #555;">Sałatka (100000 Cyca)</div>
  </div>
</div>

<div class="inventory">
  <h2>Ekwipunek</h2>
  <div class="inventory-item" id="inventory-item-10">
    <img src="Bułka.png" alt="Bułka">
    <div class="inventory-item-name">Bułka</div>
    <div class="invento unt" id="item-count-10">0</div>
  </div>
  <div class="inventory-item" id="inventory-item-200">
    <img src="Burger.png" alt="Burger">
    <div class="inventory-item-name">Burger</div>
    <div class="inventory-item-count" id="item-count-200">0</div>
  </div>
  <div class="inventory-item" id="inventory-item-1000">
    <img src="Pizza.png" alt="Pizza">
    <div class="inventory-item-name">Pizza</div>
    <div class="inventory-item-count" id="item-count-1000">0</div>
  </div>
  <div class="inventory-item" id="inventory-item-500">
    <img src="kebab.png" alt="Kebab">
    <div class="inventory-item-name">Kebab</div>
    <div class="inventory-item-count" id="item-count-500">0</div>
  </div>
  <div class="inventory-item" id="inventory-item-800">
    <img src="Nuggetsy z Frytkami.png" alt="Nuggetsy z Frytkami">
    <div class="inventory-item-name">Nuggetsy z Frytkami</div>
    <div class="inventory-item-count" id="item-count-800">0</div>
  </div>
  <div class="inventory-item" id="inventory-item-1500">
    <img src="Sałatka.png" alt="Sałatka">
    <div class="inventory-item-name">Sałatka</div>
    <div class="inventory-item-count" id="item-count-1500">0</div>
  </div>
</div>

<script>
  let score = 0;
  let clickValue = 1;
  let itemCount = {
    100: 0,
    300: 0,
    2500: 0,
    5000: 0,
    12000: 0,
    100000: 0
  };

  function updateScore() {
    document.getElementById('score-value').innerText = score;
  }

  function updateItemCount(item) {
    document.getElementById(`item-count-${item}`).innerText = itemCount[item];
  }

  function buyItem(cost) {
    if (score >= cost) {
      score -= cost;
      updateScore();
      itemCount[cost]++;
      updateItemCount(cost);
      clickValue = 1;
      for (let item in itemCount) {
        clickValue *= (itemCount[item] + 1); 
      }
      showMessage('Przedmiot zakupiony!');
      animateItemBought(cost); 
    } else {
      showMessage('Nie wystarczająco Cyców!');
    }
  }

  function showMessage(message) {
    const messageElement = document.getElementById('message');
    messageElement.innerText = message;
    messageElement.style.display = 'block';
    setTimeout(function() {
      messageElement.style.display = 'none';
    }, 2000);
  }

  function animateItemBought(item) {
    const inventoryItem = document.getElementById(`inventory-item-${item}`);
    inventoryItem.classList.add('item-animation');
    setTimeout(() => {
      inventoryItem.classList.remove('item-animation');
    }, 1000);
  }

  function resetGame() {
    score = 0;
    clickValue = 1;
    itemCount = {
      100: 0,
      300: 0,
      2500: 0,
      5000: 0,
      12000: 0,
      100000: 0
    };
    updateScore();
    updateItemCount(100);
    updateItemCount(300);
    updateItemCount(2500);
    updateItemCount(5000);
    updateItemCount(12000);
    updateItemCount(100000);
    localStorage.removeItem('gameState'); 
  }

  function saveGameState() {
    localStorage.setItem('gameState', JSON.stringify({ score, clickValue, itemCount }));
  }

  function loadGameState() {
    const savedGameState = localStorage.getItem('gameState');
    if (savedGameState) {
      const { score: savedScore, clickValue: savedClickValue, itemCount: savedItemCount } = JSON.parse(savedGameState);
      score = savedScore;
      clickValue = savedClickValue;
      itemCount = savedItemCount;
      updateScore();
      updateItemCount(100);
      updateItemCount(300);
      updateItemCount(2500);
      updateItemCount(5000);
      updateItemCount(12000);
      updateItemCount(100000);
    }
  }

  window.onload = function() {
    loadGameState();
  }

  window.onbeforeunload = function() {
    saveGameState();
  }
</script>

</body>
</html>
