<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycu Clicker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<button id="reset-button" onclick="resetGame()">Resetuj grę</button>

<div class="container">
  <div class="header">
    <h1>Cycu Clicker</h1>
    <div id="score">Cycu: <span id="score-value">0</span></div>
  </div>

  <div id="image-container">
    <img id="click-image" src="Cycu.jpg" alt="Click Image">
  </div>

  <div id="shop">
    <div class="item" onclick="buyItem(10)">
      <img src="Bułka.png" alt="Bułka">
      <div class="item-info">Bułka (10 Cyca)</div>
    </div>
    <div class="item" onclick="buyItem(200)">
      <img src="Burger.png" alt="Burger">
      <div class="item-info">Burger (200 Cyca)</div>
    </div>
    <div class="item" onclick="buyItem(1000)">
      <img src="Pizza.png" alt="Pizza">
      <div class="item-info">Pizza (1000 Cyca)</div>
    </div>
    <!-- Nowe przedmioty -->
    <div class="item" onclick="buyItem(500)">
      <img src="YourCustomImage1.png" alt="YourCustomImage1">
      <div class="item-info">Przedmiot 1 (500 Cyca)</div>
    </div>
    <div class="item" onclick="buyItem(800)">
      <img src="YourCustomImage2.png" alt="YourCustomImage2">
      <div class="item-info">Przedmiot 2 (800 Cyca)</div>
    </div>
    <div class="item" onclick="buyItem(1500)">
      <img src="YourCustomImage3.png" alt="YourCustomImage3">
      <div class="item-info">Przedmiot 3 (1500 Cyca)</div>
    </div>
  </div>

  <div class="inventory">
    <h2>Ekwipunek</h2>
    <table>
      <tr>
        <th>Przedmiot</th>
        <th>Ilość</th>
      </tr>
      <tr>
        <td><img src="Bułka.png" alt="Bułka" class="inventory-item-10"></td>
        <td id="item-count-10" class="item-count">0</td>
      </tr>
      <tr>
        <td><img src="Burger.png" alt="Burger" class="inventory-item-200"></td>
        <td id="item-count-200" class="item-count">0</td>
      </tr>
      <tr>
        <td><img src="Pizza.png" alt="Pizza" class="inventory-item-1000"></td>
        <td id="item-count-1000" class="item-count">0</td>
      </tr>
      <!-- Nowe przedmioty w ekwipunku -->
      <tr>
        <td><img src="YourCustomImage1.png" alt="YourCustomImage1" class="inventory-item-500"></td>
        <td id="item-count-500" class="item-count">0</td>
      </tr>
      <tr>
        <td><img src="YourCustomImage2.png" alt="YourCustomImage2" class="inventory-item-800"></td>
        <td id="item-count-800" class="item-count">0</td>
      </tr>
      <tr>
        <td><img src="YourCustomImage3.png" alt="YourCustomImage3" class="inventory-item-1500"></td>
        <td id="item-count-1500" class="item-count">0</td>
      </tr>
    </table>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
