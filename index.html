<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycu Clicker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
  }
  #score {
    font-size: 24px;
    margin-bottom: 20px;
  }
  #image-container {
    margin-bottom: 20px;
  }
  #click-image {
    width: 200px;
    height: 200px;
    cursor: pointer;
  }
  #shop {
    margin-top: 50px;
  }
  .item {
    display: inline-block;
    margin: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    cursor: pointer;
  }
  .item img {
    width: 100px;
    height: 100px;
    margin-bottom: 5px;
  }
</style>
</head>
<body>

<div id="score">Cycu: <span id="score-value">0</span></div>

<div id="image-container">
  <img id="click-image" src="Test.jpg" alt="Click Image">
</div>

<div id="shop">
  <div class="item" onclick="buyItem(10)">
    <img src="Bułka.png" alt="Bułka">
    <div>Bułka (10 Cycu)</div>
  </div>
  <div class="item" onclick="buyItem(50)">
    <img src="Burger.png" alt="Burger">
    <div>Burger (50 Cycu)</div>
  </div>
  <div class="item" onclick="buyItem(100)">
    <img src="Pizza.png" alt="Pizza">
    <div>Pizza (100 Cycu)</div>
  </div>
</div>

<script>
  // Add click event listener to the image
  document.getElementById('click-image').addEventListener('click', handleClick);

  // Function to handle buying items
  function buyItem(cost) {
    if (score >= cost) {
      score -= cost;
      updateScore();
      // Add code here to grant item purchased by the player
      alert('Przedmiot zakupiony!');
    } else {
      alert('Nie wystarczającu Cyca!');
    }
  }

  // Function to upgrade click value
  function upgradeClickValue(cost, increase) {
    if (score >= cost) {
      score -= cost;
      clickValue += increase;
      updateScore();
      alert('Ulepszono!');
    } else {
      alert('Nie wystarczającu Cyca!');
    }
  }
</script>

</body>
</html>
