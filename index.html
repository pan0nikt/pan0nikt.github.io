<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycu Clicker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
    text-align: center;
    color: #333;
  }
  #score {
    font-size: 24px;
    margin-bottom: 20px;
    color: #555;
  }
  #image-container {
    margin-bottom: 20px;
  }
  #click-image {
    width: 200px;
    height: 200px;
    cursor: pointer;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
    transition: transform 0.3s ease;
  }
  #shop {
    margin-top: 50px;
  }
  .item {
    display: inline-block;
    margin: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    cursor: pointer;
    background-color: #fff;
    box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
  }
  .item:hover {
    transform: scale(1.05);
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
  }
  .item img {
    width: 100px;
    height: 100px;
    margin-bottom: 5px;
    border-radius: 5px;
  }
  .inventory {
    margin-top: 20px;
    width: 80%;
    margin-left: auto;
    margin-right: auto;
  }
  .inventory table {
    width: 100%;
    border-collapse: collapse;
    border: 2px solid #888;
    background-color: #fff;
  }
  .inventory th, .inventory td {
    border: 1px solid #888;
    padding: 10px;
  }
  .inventory th {
    background-color: #ddd;
    font-weight: bold;
  }
  .inventory .item-count {
    font-weight: bold;
  }
</style>
</head>
<body>

<audio id="purchase-sound" preload="auto">
  <source src="purchase_sound.mp3" type="audio/mpeg">
</audio>

<div id="score">Cycu: <span id="score-value">0</span></div>

<div id="image-container">
  <img id="click-image" src="Cycu.jpg" alt="Click Image">
</div>

<div id="shop">
  <div class="item" onclick="buyItem(10)">
    <img src="Bułka.png" alt="Bułka">
    <div style="color: #555;">Bułka (10 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(200)">
    <img src="Burger.png" alt="Burger">
    <div style="color: #555;">Burger (200 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(1000)">
    <img src="Pizza.png" alt="Pizza">
    <div style="color: #555;">Pizza (1000 Cyca)</div>
  </div>
</div>

<div class="inventory">
  <h2>Ekwipunek</h2>
  <table>
    <tr>
      <th>Przedmiot</th>
      <th>Ilość</th>
    </tr>
    <tr>
      <td>Bułka</td>
      <td id="item-count-10" class="item-count">0</td>
    </tr>
    <tr>
      <td>Burger</td>
      <td id="item-count-200" class="item-count">0</td>
    </tr>
    <tr>
      <td>Pizza</td>
      <td id="item-count-1000" class="item-count">0</td>
    </tr>
  </table>
</div>

<script>
  let score = 0;
  let clickValue = 1;
  let itemCount = {
    10: 0,
    200: 0,
    1000: 0
  };

  function updateScore() {
    document.getElementById('score-value').innerText = score;
  }

  function updateItemCount(item) {
    document.getElementById(`item-count-${item}`).innerText = itemCount[item];
  }

  function handleClick() {
    this.style.transform = 'scale(0.9)';
    setTimeout(() => {
      this.style.transform = 'scale(1)';
    }, 100);
    score += clickValue;
    updateScore();
  }

  document.getElementById('click-image').addEventListener('click', handleClick);

  function buyItem(cost) {
    if (score >= cost) {
      score -= cost;
      updateScore();
      itemCount[cost]++;
      updateItemCount(cost);
      stackItems();
      clickValue *= itemCount[cost]; // Mnożenie ilości przedmiotu przez clickValue
      showMessage('Przedmiot zakupiony!');
      playPurchaseSound();
    } else {
      showMessage('Nie wystarczająco Cyców!');
    }
  }

  function stackItems() {
    for (let item in itemCount) {
      let count = itemCount[item];
      if (count > 1) {
        document.getElementById(`item-count-${item}`).innerText = `x${count}`;
      }
    }
  }

  function showMessage(message) {
    const messageElement = document.getElementById('message');
    messageElement.innerText = message;
    messageElement.style.display = 'block';
    setTimeout(function() {
      messageElement.style.display = 'none';
    }, 2000);
  }

  function playPurchaseSound() {
    const audio = document.getElementById('purchase-sound');
    audio.play();
  }
</script>

</body>
</html>
