<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycu Clicker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
    text-align: center;
    color: #333;
  }
  #score {
    font-size: 24px;
    margin-bottom: 20px;
    color: #555;
  }
  #image-container {
    margin-bottom: 20px;
  }
  #click-image {
    width: 200px;
    height: 200px;
    cursor: pointer;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
    transition: transform 0.3s ease;
  }
  #shop {
    margin-top: 50px;
  }
  .item {
    display: inline-block;
    margin: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    cursor: pointer;
    background-color: #fff;
    box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
  }
  .item:hover {
    transform: scale(1.05);
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
  }
  .item img {
    width: 100px;
    height: 100px;
    margin-bottom: 5px;
    border-radius: 5px;
  }
  #message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: rgba(255, 255, 255, 0.9);
    padding: 20px;
    border-radius: 10px;
    z-index: 999;
    display: none;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
  }
  /* Dodatkowe style dla figur geometrycznych */
  .circle {
    width: 100px;
    height: 100px;
    background-color: #6c5b7b;
    border-radius: 50%;
    position: absolute;
    top: 10%;
    left: 10%;
  }
  .rectangle {
    width: 150px;
    height: 100px;
    background-color: #c06c84;
    position: absolute;
    top: 30%;
    left: 70%;
  }
  .triangle {
    width: 0;
    height: 0;
    border-left: 50px solid transparent;
    border-right: 50px solid transparent;
    border-bottom: 100px solid #355c7d;
    position: absolute;
    top: 60%;
    left: 30%;
  }
</style>
</head>
<body>

<audio id="purchase-sound" src="purchase_sound.mp3" preload="auto"></audio>

<div id="score">Cycu: <span id="score-value">0</span></div>

<div id="image-container">
  <img id="click-image" src="Test.jpg" alt="Click Image">
</div>

<div id="shop">
  <div class="item" onclick="buyItem(10)">
    <img src="Bułka.png" alt="Bułka">
    <div style="color: #555;">Bułka (10 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(200)">
    <img src="Burger.png" alt="Burger">
    <div style="color: #555;">Burger (200 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(1000)">
    <img src="Pizza.png" alt="Pizza">
    <div style="color: #555;">Pizza (1000 Cyca)</div>
  </div>
</div>

<div id="message"></div>

<!-- Dodatkowe figury geometryczne -->
<div class="circle"></div>
<div class="rectangle"></div>
<div class="triangle"></div>

<script>
  let score = 0;
  let clickValue = 1;

  function updateScore() {
    document.getElementById('score-value').innerText = score;
  }

  function handleClick() {
    this.style.transform = 'scale(0.9)'; // Skalowanie obrazka przy kliknięciu
    setTimeout(() => {
      this.style.transform = 'scale(1)'; // Przywrócenie oryginalnego rozmiaru
    }, 100); // Czas trwania animacji w milisekundach
    score += clickValue;
    updateScore();
  }

  document.getElementById('click-image').addEventListener('click', handleClick);

  function buyItem(cost) {
    if (score >= cost) {
      score -= cost;
      updateScore();
      if (cost === 10) {
        clickValue = 2;
      } else if (cost === 200) {
        clickValue = 5;
      } else if (cost === 1000) {
        clickValue = 10;
      }
      showMessage('Przedmiot zakupiony!');
      playPurchaseSound(); // Dodanie efektu dźwiękowego
    } else {
      showMessage('Nie wystarczająco Cyców!');
    }
  }

  function showMessage(message) {
    const messageElement = document.getElementById('message');
    messageElement.innerText = message;
    messageElement.style.display = 'block';
    setTimeout(function() {
      messageElement.style.display = 'none';
    }, 2000);
  }

  function playPurchaseSound() {
    const audio = document.getElementById('purchase-sound');
    audio.play();
  }
</script>

</body>
</html>
