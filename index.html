<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycu Clicker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    text-align: center;
  }
  #score {
    font-size: 24px;
    margin-bottom: 20px;
    color: #333;
  }
  #image-container {
    margin-bottom: 20px;
  }
  #click-image {
    width: 200px;
    height: 200px;
    cursor: pointer;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
  }
  #shop {
    margin-top: 50px;
  }
  .item {
    display: inline-block;
    margin: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    cursor: pointer;
    background-color: #fff;
    box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
  }
  .item img {
    width: 100px;
    height: 100px;
    margin-bottom: 5px;
    border-radius: 5px;
  }
  #message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: rgba(255, 255, 255, 0.8);
    padding: 20px;
    border-radius: 10px;
    z-index: 999;
    display: none;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
  }
</style>
</head>
<body>

<div id="score">Cycu: <span id="score-value">0</span></div>

<div id="image-container">
  <img id="click-image" src="Test.jpg" alt="Click Image">
</div>

<div id="shop">
  <div class="item" onclick="buyItem(10)">
    <img src="Bułka.png" alt="Bułka">
    <div>Bułka (10 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(50)">
    <img src="Burger.png" alt="Burger">
    <div>Burger (50 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(100)">
    <img src="Pizza.png" alt="Pizza">
    <div>Pizza (100 Cyca)</div>
  </div>
</div>

<div id="message"></div>

<script>
  let score = 0;
  let clickValue = 1;
  let itemsBought = {
    'Bułka': 0,
    'Burger': 0,
    'Pizza': 0
  };

  function updateScore() {
    document.getElementById('score-value').innerText = score;
  }

  function handleClick() {
    score += clickValue;
    updateScore();
  }

  // Add click event listener to the image
  document.getElementById('click-image').addEventListener('click', handleClick);

  function buyItem(cost) {
    if (score >= cost) {
      score -= cost;
      updateScore();
      if (cost === 10) {
        clickValue = 2;
        itemsBought['Bułka']++;
        if (itemsBought['Bułka'] >= 2) {
          clickValue *= 2;
        }
      } else if (cost === 50) {
        clickValue = 5;
        itemsBought['Burger']++;
        if (itemsBought['Burger'] >= 2) {
          clickValue *= 5;
        }
      } else if (cost === 100) {
        clickValue = 10;
        itemsBought['Pizza']++;
        if (itemsBought['Pizza'] >= 2) {
          clickValue *= 10;
        }
      }
      showMessage('Przedmiot zakupiony!');
    } else {
      showMessage('Nie wystarczająco Cyców!');
    }
  }

  function showMessage(message) {
    const messageElement = document.getElementById('message');
    messageElement.innerText = message;
    messageElement.style.display = 'block';
    setTimeout(function() {
      messageElement.style.display = 'none';
    }, 2000); // Hide message after 2 seconds
  }
</script>

</body>
</html>
