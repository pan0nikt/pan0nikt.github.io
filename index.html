<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Chat</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f0f0f0;
    }
    #chat-container {
        width: 400px;
        margin: 50px auto;
        background-color: #fff;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        padding: 20px;
    }
    #chat-messages {
        height: 300px;
        overflow-y: scroll;
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 5px;
        background-color: #f9f9f9;
    }
    #message-input {
        width: calc(100% - 20px);
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    #send-btn {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        background-color: #4caf50;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="chat-container">
    <div id="chat-messages"></div>
    <input type="text" id="message-input" placeholder="Type your message...">
    <button id="send-btn">Send</button>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function(){
        var chatDataURL = 'https://raw.githubusercontent.com/username/repository/master/chatData.json'; // Ścieżka do pliku JSON na GitHub

        // Funkcja pobierająca wiadomości z pliku JSON
        function getMessages() {
            $.getJSON(chatDataURL, function(data){
                $('#chat-messages').empty(); // Wyczyść zawartość czatu przed dodaniem nowych wiadomości
                $.each(data.messages, function(index, message){
                    addMessage(message.text, message.sender);
                });
            });
        }

        // Funkcja dodająca wiadomość do czatu
        function addMessage(message, sender) {
            var messageDiv = '<div><strong>' + sender + ': </strong>' + message + '</div>';
            $('#chat-messages').append(messageDiv);
        }

        // Funkcja wysyłająca nową wiadomość do pliku JSON
        function sendMessage(message, sender) {
            $.getJSON(chatDataURL, function(data){
                data.messages.push({ text: message, sender: sender });
                $.ajax({
                    url: chatDataURL,
                    type: 'PUT',
                    data: JSON.stringify(data),
                    success: function(){
                        getMessages(); // Po wysłaniu wiadomości odśwież czat, aby pokazać nową wiadomość
                    }
                });
            });
        }

        // Pobierz i wyświetl istniejące wiadomości
        getMessages();

        // Nasłuchuj kliknięcia przycisku "Send"
        $('#send-btn').click(function(){
            var message = $('#message-input').val();
            if (message !== '') {
                sendMessage(message, 'Me');
                $('#message-input').val('');
            }
        });

        // Nasłuchuj wciśnięcia klawisza "Enter" na polu input
        $('#message-input').keypress(function(event){
            if (event.which === 13) {
                $('#send-btn').click();
            }
        });
    });
</script>

</body>
</html>
