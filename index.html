<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jastrowski Kartel</title></title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .clickable-area {
            position: absolute;
            width: 50vw;
            height: 50vh;
            background-color: rgba(255, 0, 0, 0.3); /* Czerwony obszar, dostosuj kolor według potrzeb */
        }

        .flying-image {
            position: absolute;
            width: 100px; /* Dostosuj rozmiar zdjęcia */
            height: auto;
        }
    </style>
</head>
<body>
    <div class="clickable-area" onclick="changePage('https://www.github.io')"></div>
    <div class="clickable-area" style="top: 50vh;" onclick="changePage('https://www.pornhub.com')"></div>
    <!-- Dodaj więcej obszarów lub dostosuj je według potrzeb -->

    <script>
        function changePage(url) {
            window.location.href = url;
        }

        function startFlyingImages() {
            function createFlyingImage() {
                const flyingImage = document.createElement("img");
                flyingImage.src = "test1.jpg"; // Zmień na właściwą ścieżkę
                flyingImage.alt = "Latające Zdjęcie";
                flyingImage.classList.add("flying-image");
                document.body.appendChild(flyingImage);

                animateFlyingImage(flyingImage);
            }

            function animateFlyingImage(image) {
                const maxX = window.innerWidth - image.width;
                const maxY = window.innerHeight - image.height;

                let x = Math.random() * maxX;
                let y = Math.random() * maxY;

                let xSpeed = (Math.random() - 2) * 5;
                let ySpeed = (Math.random() - 2) * 5;

                setInterval(() => {
                    x += xSpeed;
                    y += ySpeed;

                    if (x < 0 || x > maxX || y < 0 || y > maxY) {
                        xSpeed = -xSpeed;
                        ySpeed = -ySpeed;

                        const clone = image.cloneNode(true);
                        clone.style.left = x + "px";
                        clone.style.top = y + "px";
                        document.body.appendChild(clone);
                        animateFlyingImage(clone);
                    }

                    image.style.left = x + "px";
                    image.style.top = y + "px";
                }, 50);
            }

            // Tworzenie kilku latających obrazków
            for (let i = 0; i < 5; i++) {
                createFlyingImage();
            }
        }

        // Uruchamianie animacji po załadowaniu strony
        window.onload = startFlyingImages;
    </script>
</body>
</html>
