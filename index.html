<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycu Clicker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
    text-align: center;
    color: #333;
    margin: 0;
    padding: 0;
  }

  #score {
    font-size: 24px;
    margin-bottom: 20px;
    color: #555;
  }

  .item {
    display: inline-block;
    margin: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    cursor: pointer;
    background-color: #fff;
    box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
    vertical-align: top;
    width: 200px;
  }

  .item:hover {
    transform: scale(1.05);
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
  }

  .item img {
    width: 100px;
    height: 100px;
    margin-bottom: 10px;
    border-radius: 5px;
  }

  #shop {
    margin-top: 20px;
    text-align: center;
  }

  .inventory {
    margin-top: 30px;
    width: 90%;
    margin-left: auto;
    margin-right: auto;
    max-height: 400px;
    overflow: auto;
    text-align: center;
  }

  .inventory-item {
    display: inline-block;
    margin: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #fff;
    box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
    width: 150px;
  }

  .inventory-item:hover {
    transform: scale(1.05);
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
  }

  .inventory-item img {
    width: 80px;
    height: auto;
    border-radius: 5px;
  }

  .inventory-item-name {
    margin-top: 5px;
    font-size: 14px;
    color: #555;
  }

  .inventory-item-count {
    margin-top: 5px;
    font-weight: bold;
    color: #777;
  }

  .item-animation {
    animation: item-bought 1s ease;
  }

  @keyframes item-bought {
    0% { transform: translateY(-20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  #reset-button {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 10px 20px;
    background-color: #ff6b6b;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s ease;
  }

  #reset-button:hover {
    background-color: #ff5252;
  }
</style>
</head>
<body>

<button id="reset-button" onclick="resetGame()">Resetuj grę</button>

<div id="score">Cycu: <span id="score-value">0</span></div>

<div id="shop">
  <div class="item" onclick="buyItem(10)">
    <img src="Bułka.png" alt="Bułka">
    <div style="color: #555;">Bułka (10 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(200)">
    <img src="Burger.png" alt="Burger">
    <div style="color: #555;">Burger (200 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(1000)">
    <img src="Pizza.png" alt="Pizza">
    <div style="color: #555;">Pizza (1000 Cyca)</div>
  </div>
 
  <div class="item" onclick="buyItem(500)">
    <img src="YourCustomImage1.png" alt="YourCustomImage1">
    <div style="color: #555;">Przedmiot 1 (500 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(800)">
    <img src="YourCustomImage2.png" alt="YourCustomImage2">
    <div style="color: #555;">Przedmiot 2 (800 Cyca)</div>
  </div>
  <div class="item" onclick="buyItem(1500)">
    <img src="YourCustomImage3.png" alt="YourCustomImage3">
    <div style="color: #555;">Przedmiot 3 (1500 Cyca)</div>
  </div>
</div>

<div class="inventory">
  <h2>Ekwipunek</h2>
  <div class="inventory-item" id="inventory-item-10">
    <img src="Bułka.png" alt="Bułka">
    <div class="inventory-item-name">Bułka</div>
    <div class="inventory-item-count" id="item-count-10">0</div>
  </div>
  <div class="inventory-item" id="inventory-item-200">
    <img src="Burger.png" alt="Burger">
    <div class="inventory-item-name">Burger</div>
    <div class="inventory-item-count" id="item-count-200">0</div>
  </div>
  <div class="inventory-item" id="inventory-item-1000">
    <img src="Pizza.png" alt="Pizza">
    <div class="inventory-item-name">Pizza</div>
    <div class="inventory-item-count" id="item-count-1000">0</div>
  </div>
  <div class="inventory-item" id="inventory-item-500">
    <img src="YourCustomImage1.png" alt="YourCustomImage1">
    <div class="inventory-item-name">Przedmiot 1</div>
    <div class="inventory-item-count" id="item-count-500">0</div>
  </div>
  <div class="inventory-item" id="inventory-item-800">
    <img src="YourCustomImage2.png" alt="YourCustomImage2">
    <div class="inventory-item-name">Przedmiot 2</div>
    <div class="inventory-item-count" id="item-count-800">0</div>
  </div>
  <div class="inventory-item" id="inventory-item-1500">
    <img src="YourCustomImage3.png" alt="YourCustomImage3">
    <div class="inventory-item-name">Przedmiot 3</div>
    <div class="inventory-item-count" id="item-count-1500">0</div>
  </div>
</div>

<script>
  let score = 0;
  let clickValue = 1;
  let itemCount = {
    10: 0,
    200: 0,
    1000: 0,
    500: 0,
    800: 0,
    1500: 0
  };

  function updateScore() {
    document.getElementById('score-value').innerText = score;
  }

  function updateItemCount(item) {
    document.getElementById(`item-count-${item}`).innerText = itemCount[item];
  }

  function updateClickImageWidth() {
    const clickImage = document.getElementById('click-image');
    const maxWidth = 40000; 
    const minWidth = 200; 
    const widthIncrement = 50; 

    let width = minWidth + Math.floor(score / 100) * widthIncrement;
    width = Math.min(width, maxWidth);
    
    clickImage.style.width = `${width}px`;
  }

  function handleClick() {
    this.style.transform = 'scale(0.9)';
    setTimeout(() => {
      this.style.transform = 'scale(1)';
    }, 100);
    score += clickValue;
    updateScore();
    updateClickImageWidth(); 
  }

  document.getElementById('click-image').addEventListener('click', handleClick);

  function buyItem(cost) {
    if (score >= cost) {
      score -= cost;
      updateScore();
      itemCount[cost]++;
      updateItemCount(cost);
      clickValue = 1;
      for (let item in itemCount) {
        clickValue *= (itemCount[item] + 1); 
      }
      showMessage('Przedmiot zakupiony!');
      animateItemBought(cost); 
    } else {
      showMessage('Nie wystarczająco Cyców!');
    }
  }

  function showMessage(message) {
    const messageElement = document.getElementById('message');
    messageElement.innerText = message;
    messageElement.style.display = 'block';
    setTimeout(function() {
      messageElement.style.display = 'none';
    }, 2000);
  }

  function animateItemBought(item) {
    const inventoryItem = document.getElementById(`inventory-item-${item}`);
    inventoryItem.classList.add('item-animation');
    setTimeout(() => {
      inventoryItem.classList.remove('item-animation');
    }, 1000);
  }

  function resetGame() {
    score = 0;
    clickValue = 1;
    itemCount = {
      10: 0,
      200: 0,
      1000: 0,
      500: 0,
      800: 0,
      1500: 0
    };
    updateScore();
    updateItemCount(10);
    updateItemCount(200);
    updateItemCount(1000);
    updateItemCount(500);
    updateItemCount(800);
    updateItemCount(1500);
    updateClickImageWidth();
    localStorage.removeItem('gameState'); 
  }

  function saveGameState() {
    localStorage.setItem('gameState', JSON.stringify({ score, clickValue, itemCount }));
  }

  function loadGameState() {
    const savedGameState = localStorage.getItem('gameState');
    if (savedGameState) {
      const { score: savedScore, clickValue: savedClickValue, itemCount: savedItemCount } = JSON.parse(savedGameState);
      score = savedScore;
      clickValue = savedClickValue;
      itemCount = savedItemCount;
      updateScore();
      updateItemCount(10);
      updateItemCount(200);
      updateItemCount(1000);
      updateItemCount(500);
      updateItemCount(800);
      updateItemCount(1500);
      updateClickImageWidth();
    }
  }

  window.onload = function() {
    loadGameState();
  }

  window.onbeforeunload = function() {
    saveGameState();
  }
</script>

</body>
</html>
